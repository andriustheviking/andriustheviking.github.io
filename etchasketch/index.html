<!DOCTYPE html>
<html>
	<head>
		<title>Etch-e-Sketch</title>
		<link rel="stylesheet" type="text/css" href="./sketch.css">	
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
		<script src="sketch.js"></script>
	</head>

	<body>
		<img src="../img/etchasketch.png">
		<div id="interface">
			<form onsubmit="return false;">
				Pick a resolution and hit shake:

				<select></select>

				<div id="buttondiv">
					<input type="submit" value="Shake!" class="button" id="shake">
					<input type="button" value="Rainbow!" class="button" id="rainbow">
				</div>
			</form>

		</div>

		<div id="grid"></div>


	</body>
</html>
